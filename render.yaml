services:
  - type: worker            # Background Worker: bot không nhận request HTTP, chỉ cần chạy liên tục
    name: mirai-bot-clean
    runtime: node
    plan: starter            # free tier không áp dụng cho worker, xem giải thích trong DEPLOY.md
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FB_APPSTATE
        sync: false           # đặt thủ công trong dashboard, không lưu trong repo
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_KEY
        sync: false
